<script>
  // Sticky header scroll effect
  const header = document.querySelector('.site-header');
  let lastScroll = 0;

  window.addEventListener('scroll', () => {
    const currentScroll = window.pageYOffset;

    if (currentScroll > 50) {
      header.classList.add('scrolled');
    } else {
      header.classList.remove('scrolled');
    }

    lastScroll = currentScroll;
  });

  // Smooth scroll for anchor links
  document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function (e) {
      const href = this.getAttribute('href');
      if (href !== '#') {
        e.preventDefault();
        const target = document.querySelector(href);
        if (target) {
          target.scrollIntoView({
            behavior: 'smooth',
            block: 'start'
          });
        }
      }
    });
  });

  // Animate elements on scroll
  const observerOptions = {
    threshold: 0.1,
    rootMargin: '0px 0px -50px 0px'
  };

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.style.opacity = '1';
        entry.target.style.transform = 'translateY(0)';
      }
    });
  }, observerOptions);

  // Observe feature cards
  document.querySelectorAll('.feature-card').forEach((card, index) => {
    card.style.opacity = '0';
    card.style.transform = 'translateY(30px)';
    card.style.transition = `opacity 0.6s ease ${index * 0.1}s, transform 0.6s ease ${index * 0.1}s`;
    observer.observe(card);
  });

  // Observe stat items
  document.querySelectorAll('.stat-item').forEach((item, index) => {
    item.style.opacity = '0';
    item.style.transform = 'translateY(30px)';
    item.style.transition = `opacity 0.6s ease ${index * 0.15}s, transform 0.6s ease ${index * 0.15}s`;
    observer.observe(item);
  });

  // Newsletter subscription (Listmonk)
  document.querySelectorAll('.newsletter-form').forEach(function(form) {
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      var email = form.querySelector('input[type="email"]').value;
      var nameInput = form.querySelector('input[name="name"]');
      var name = nameInput ? nameInput.value : '';
      var btn = form.querySelector('button[type="submit"]');
      var msg = form.closest('.newsletter-section').querySelector('.newsletter-msg');

      btn.disabled = true;
      btn.textContent = 'Subscribing...';

      fetch('https://newsletter.minz.at/api/public/subscription', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: email,
          name: name || undefined,
          list_uuids: ['ae7a1bf3-caf3-4dba-9791-a7a30a8d0f34']
        })
      })
      .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
      .then(function(res) {
        if (msg) {
          msg.style.display = 'block';
          msg.style.color = '#16a34a';
          msg.textContent = 'Check your inbox to confirm your subscription!';
        }
        form.reset();
      })
      .catch(function() {
        if (msg) {
          msg.style.display = 'block';
          msg.style.color = '#dc2626';
          msg.textContent = 'Something went wrong. Please try again.';
        }
      })
      .finally(function() {
        btn.disabled = false;
        btn.textContent = 'Subscribe';
      });
    });
  });
</script>
