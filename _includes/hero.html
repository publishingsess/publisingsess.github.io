<div class="hero-section">
  <div class="hero-container">
    <div class="hero-image">
      <img src="{{ '/assets/presentator/living.png' | relative_url }}" alt="{{ site.title | escape }}">
    </div>
    <div class="hero-content">
      <h1>{{ include.title | default: "Build a Sustainable, Profitable Publishing Business" }}</h1>
      <p class="hero-subtitle">
        {{ include.subtitle | default: "Your go-to resource for indie authors and publishers who want real, actionable strategies—not fluff." }}
      </p>
      <div class="cta-buttons">
        <a href="https://www.youtube.com/@PublishingStrategySessions" class="btn btn-primary" target="_blank">
          <span>📺 Watch on YouTube</span>
        </a>
        <a href="#newsletter" class="btn btn-secondary">
          <span>Get Weekly Strategies</span>
        </a>
      </div>
    </div>
  </div>
</div>
