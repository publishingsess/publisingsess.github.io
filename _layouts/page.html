---
layout: default
---

<div class="hero-section" style="padding: 4rem 0;">
  <div class="wrapper" style="max-width: 900px; margin: 0 auto;">
    <h1 style="color: #FDFCF9; font-size: 3.5rem;">{{ page.title | escape }}</h1>
  </div>
</div>

<div class="page-content">
  <div class="wrapper" style="padding-top: 4rem; padding-bottom: 4rem;">
    <article class="post">
      <div class="post-content" style="max-width: 900px; margin: 0 auto;">
        {{ content }}
      </div>
    </article>
  </div>
</div>
